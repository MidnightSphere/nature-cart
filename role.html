<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Role | Nature Cart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f0fdf4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            text-align: center;
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
            width: 350px;
        }
        .btn-custom {
            background: #05b160;
            color: white;
            width: 100%;
        }
        .btn-custom:hover {
            background: #048d4e;
        }
        .btn-back {
            background: #ccc;
            color: black;
            width: 55%;
        }
        .btn-back:hover {
            background: #bbb;
        }
    </style>
</head>
<body>

    <div class="container">
        <h3>Select Your Role</h3>
        <button class="btn btn-custom mt-3" onclick="selectRole('Customer')">Log in as Customer</button>
        <button class="btn btn-custom mt-3" onclick="selectRole('Farmer')">Log in as Farmer</button>
        <button class="btn btn-back mt-3" onclick="goBack()">Go to Home Page</button>
    </div>

    <script> 
        function selectRole(role) {
            localStorage.setItem("userRole", role);
            if (role === "Customer") {
                window.location.href = "login-customer.html";
            } else if (role === "Farmer") {
                window.location.href = "login-farmer.html";
            }
        }

        function goBack() {
            window.location.href = "index.html";
        }
    </script>

</body>
</html>
